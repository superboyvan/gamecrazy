    <rect x="640" y="455" width="150" height="40" rx="8"/>
    <rect x="640" y="520" width="150" height="40" rx="8"/>
  </g>
  <rect x="820" y="455" width="116" height="120" rx="16" fill="#ef233c"/>
  <g fill="#fff">
    <circle cx="850" cy="485" r="8"/>
    <circle cx="908" cy="485" r="8"/>
    <circle cx="879" cy="515" r="8"/>
    <circle cx="850" cy="545" r="8"/>
    <circle cx="908" cy="545" r="8"/>
  </g>
  <text x="258" y="350" fill="#050816" font-family="Impact, Arial Black, sans-serif" font-size="94">GAME CRAZY</text>
  <text x="92" y="720" fill="#fff" font-family="Impact, Arial Black, sans-serif" font-size="70">MARKET ROOTS</text>
